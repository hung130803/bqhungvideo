name: Build Windows app

# Chạy khi đẩy 1 tag dạng v* (vd v1.0.1) -> build .exe + tạo Release tự động.
# Máy người dùng (đã cài app) sẽ thấy thông báo "có bản mới" và tải từ Release này.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:            # cho phép bấm chạy tay trên GitHub

permissions:
  contents: write              # để tạo Release + upload file

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cài thư viện (bản gọn cho .exe)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt
          pip install pyinstaller==6.10.0

      - name: Tải ffmpeg + yt-dlp (kèm theo app cho máy chưa có)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin | Out-Null
          Invoke-WebRequest https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile bin/yt-dlp.exe
          Invoke-WebRequest https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip -OutFile ff.zip
          Expand-Archive ff.zip -DestinationPath ff -Force
          $ff = Get-ChildItem ff -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $fp = Get-ChildItem ff -Recurse -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName bin/ffmpeg.exe
          Copy-Item $fp.FullName bin/ffprobe.exe
          Get-ChildItem bin

      - name: Đóng gói (PyInstaller)
        run: >
          pyinstaller --noconfirm --windowed --name "BQHungVideo"
          --collect-all PyQt6
          --collect-submodules app
          --collect-all google.generativeai
          --hidden-import openai
          --hidden-import requests
          --hidden-import psutil
          --hidden-import dotenv
          --add-data "app/core/potoken_plugins;app/core/potoken_plugins"
          --add-data ".env.example;."
          --add-binary "bin/ffmpeg.exe;."
          --add-binary "bin/ffprobe.exe;."
          --add-binary "bin/yt-dlp.exe;."
          main.py

      - name: Nén thư mục app
        shell: bash
        run: |
          cd dist
          7z a -tzip "BQHungVideo-${{ github.ref_name }}.zip" "BQHungVideo"

      - name: Tạo Release + upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BQHungVideo-*.zip
          generate_release_notes: true
